<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل السيارة</title>

    <!-- تحميل مكتبة Pannellum -->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

    <style>
        body {
            direction: rtl;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        #panorama-container {
            width: 100%;
            height: 500px;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <form method="post">
        {% csrf_token %}
        <label for="start_date">تاريخ البدء:</label>
        <input type="date" name="start_date" required>
    
        <label for="end_date">تاريخ الانتهاء:</label>
        <input type="date" name="end_date" required>
    
        <button type="submit">احجز الآن</button>
    </form>
    
    <div class="container">
        <h1>{{ car.brand }} - {{ car.name }}</h1>
        <p><strong>الموديل:</strong> {{ car.model }}</p>
        <p><strong>ناقل الحركة:</strong> {{ car.transmission }}</p>
        <p><strong>عدد المقاعد:</strong> {{ car.seats }}</p>
        <p><strong>السعر اليومي:</strong>  EGP{{ car.price_per_day }}</p>
        <p><strong>الوصف:</strong> {{ car.description }}</p>

        <h3>عرض 360 درجة:</h3>
        <div id="panorama-container"></div>
    </div>

    <script>
        window.addEventListener("load", function() {
            console.log("✅ الصفحة تم تحميلها!");

            // الحصول على رابط الصورة البانورامية من Django
            const panoramaURL = "{{ car.panorama_image.url }}";

            if (!panoramaURL) {
                console.error("❌ لا يوجد رابط صورة بانورامية!");
                return;
            }
            
            console.log("✅ رابط الصورة:", panoramaURL);

            // تهيئة Pannellum لعرض الصورة
            pannellum.viewer('panorama-container', {
                type: "equirectangular",
                panorama: panoramaURL,
                autoLoad: true,
                showZoomCtrl: true,
                compass: true,
                autoRotate: -2
            });

            console.log("✅ Pannellum تم تهيئته بنجاح!");
        });
    </script>
</body>
</html>
