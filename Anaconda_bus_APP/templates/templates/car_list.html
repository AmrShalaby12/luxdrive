<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة السيارات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: row-reverse; /* الصورة على اليمين */
            align-items: center;
            gap: 15px;
            padding: 15px;
        }
        .card img {
            border-radius: 15px;
            width: 40%;
            height: auto;
            object-fit: cover;
        }
        .card-body {
            flex: 1;
            text-align: left;
        }
        .card-title {
            font-size: 1.25rem;
            color: #333;
        }
        .card-text {
            margin: 0.5rem 0;
        }
        .price-tag {
            font-size: 1.2rem;
            background-color: #000;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }
        .btn-primary {
            background-color: #000000;
            color: #F1FF53;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
        }
        .btn-primary:hover {
            background-color: #F1FF53;
            color: #000000;
        }
    </style>
</head>
<body dir="rtl">
    <div class="container mt-4">
        <h1 class="mb-4">قائمة السيارات</h1>

        <!-- فلترة حسب النوع -->
        <form method="GET" action="{% url 'car_list' %}">
            <select name="category" onchange="this.form.submit()">
                <option value="">جميع الموديلات</option>
                {% for model in unique_models %}
                <option value="{{ model }}" {% if model == category %}selected{% endif %}>{{ model }}</option>
                {% endfor %}
            </select>
        </form>

        <div class="row">
            {% for car in cars %}
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ car.brand }} - {{ car.name }}</h5>
                        <b><p class="card-text">{{ car.transmission }}</p></b>
                        <p class="card-text">
                            <span class="price-tag">${{ car.price_per_day }}/يوم</span>
                        </p>
                        <a href="{% url 'car_detail' car.id %}" class="btn btn-primary">More</a>
                    </div>
                    {% if car.image %}
                    <img src="{{ car.image.url }}" alt="{{ car.name }}">
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
