{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">تفاصيل خطة التقسيط</h2>
    
    <div class="card p-4 shadow-sm">
        <p><strong>اسم الاشتراك:</strong> {{ subscription.name }}</p>
        <p><strong>عدد الأقساط:</strong> {{ installments_count }} قسط</p>
        <p><strong>قيمة أول قسط:</strong> {{ first_installment.amount }} جنيه</p>
        <p><strong>تاريخ الاستحقاق:</strong> {{ first_installment.due_date }}</p>
        
        <form method="post" action="{% url 'pay_installment' first_installment.id %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-success">💳 ادفع الآن</button>
        </form>
    </div>
</div>

{% endblock %}
