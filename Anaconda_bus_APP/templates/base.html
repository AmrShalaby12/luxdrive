<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allen Travels - أقوى شركة باصات لطلاب الجامعات | مواصلات ذكية وآمنة</title>
<meta name="description" content="Allen Travels هي الشركة الأقوى والأكثر تطوراً في نقل طلاب الجامعات الخاصة. نوفر مواصلات آمنة وحديثة بفضل تطبيقنا المتطور واعتمادنا على تقنيات الذكاء الاصطناعي بالتعاون مع Noxus AI Team لحماية الطلاب وضمان راحتهم.">
<meta name="keywords" content="شركة باصات جامعة الجلالة, مواصلات الجامعات, Allen Travels, باصات طلاب, نقل آمن للطلاب, الذكاء الاصطناعي في النقل, Noxus AI">

    <!-- Structured Data JSON-LD -->
    <script type="application/ld+json">
    {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "Allen Travels - شركة ألين ترانفس",
    "url": "https://allen.allentravels.com/allen/",
    "logo": "https://allen.allentravels.com/static/logo.png",
    "description": "Allen Travels هي الشركة الأقوى والأكثر تطوراً في نقل طلاب الجامعات. نوفر مواصلات آمنة وحديثة بفضل تطبيقنا المتطور واعتمادنا على الذكاء الاصطناعي بالتعاون مع Noxus AI Team لحماية الطلاب وضمان راحتهم.",
    "department": [
        {
        "@type": "CollegeOrUniversity",
        "name": "Galala University - جامعة الجلالة"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "City University of Cairo, CUC - جامعة المدينة بالقاهرة"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "Saxony Egypt University - SEU - ساكسوني جامعة مصرية"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "German University in Cairo GUC - الجامعة الألمانية بالقاهرة"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "German International University GIU - الجامعة الألمانية الدولية"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "MIU Misr International University"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "Egyptian Russian University ERU - الجامعة المصرية الروسية"
        },
        {
        "@type": "CollegeOrUniversity",
        "name": "BUC Badr University in Cairo - جامعة بدر بالقاهرة"
        }
    ],
    "founder": {
        "@type": "Organization",
        "name": "Noxus AI Team"
    },
    "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "خدمات Allen Travels",
        "itemListElement": [
        {
            "@type": "Offer",
            "itemOffered": {
            "@type": "Service",
            "name": "نقل آمن للطلاب",
            "description": "خدمة باصات يومية إلى الجامعات الخاصة مع نظام أمني ذكي يعتمد على الذكاء الاصطناعي."
            }
        },
        {
            "@type": "Offer",
            "itemOffered": {
            "@type": "Service",
            "name": "تطبيق Allen App",
            "description": "تطبيق حديث لتتبع الرحلات والحجز وإدارة اشتراكات الطلاب."
            }
        }
        ]
    }
    }
    </script>    <!-- روابط CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <meta name="google-site-verification" content="ztFnX7urGDzJUI6hwAMqlx56efLLyFQmrhg8KXlaP5M" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
    </style>
    <!-- النافبار -->
    {% include 'navigation.html' %}

    <!-- المحتوى الرئيسي -->
    <div class="container mt-5">
        {% block content %}
        <!-- يتم استبدال هذا المحتوى بالصفحات الفرعية -->
        {% endblock %}
    </div>

    <!-- الفوتر -->
    {% include 'footer.html' %}

    <!-- روابط JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
