{% extends "admin/base_site.html" %}
{% block content %}
  <h2>{{ title }}</h2>

  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="action" value="assign_trip_to_selected_reservations">
    {% for obj in reservations %}
      <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    <button type="submit" name="apply" class="default">تأكيد</button>
  </form>
{% endblock %}
