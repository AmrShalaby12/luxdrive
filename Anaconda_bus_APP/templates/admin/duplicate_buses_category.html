{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
  <h2>📑 تكرار الباصات المختارة مع كاتيجوري جديد</h2>

  <form method="post">{% csrf_token %}
    <input type="hidden" name="action" value="{{ action }}">
    {% for bus in buses %}
      <input type="hidden" name="_selected_action" value="{{ bus.pk }}">
    {% endfor %}

    <label for="category">اختر الكاتيجوري الجديد:</label>
    <select name="category" required>
      {% for cat in categories %}
        <option value="{{ cat.pk }}">{{ cat.name }}</option>
      {% endfor %}
    </select>

    <br><br>
    <button type="submit" name="apply" class="button default">📥 تكرار الباصات</button>
  </form>
{% endblock %}
