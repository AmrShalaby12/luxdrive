<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تأكيد الحجز بنجاح | نظام حجز التذاكر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.2/lottie.min.js"></script>
    <style>
        :root {
            --primary: #ae00ff;
            --secondary: #000000;
            --success: #28A745;
            --dark: #000000;
            --light: #F8F9FA;
            --gray: #6C757D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(77, 68, 219, 0.1) 0%, transparent 20%);
        }

        .success-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transform: translateY(0);
            opacity: 1;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                transparent 45%,
                rgba(108, 99, 255, 0.1) 50%,
                transparent 55%
            );
            animation: shine 3s infinite;
            z-index: -1;
        }

        @keyframes shine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 5rem;
            color: var(--success);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .success-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px dashed var(--success);
            animation: rotate 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 700;
            color: white;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .details-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            text-align: right;
            border-left: 4px solid var(--primary);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-label {
            color: var(--gray);
            font-weight: 500;
        }

        .detail-value {
            color: white;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: rgba(108, 99, 255, 0.1);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            opacity: 0;
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 30px 20px;
                width: 95%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Animation classes */
        .animate-pop {
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>


    <div class="success-container animate-fade-in">
        <div class="success-icon animate-pop">
            <i class="fas fa-check-circle"></i>
        </div>
        
        <h1>تم تأكيد حجزك بنجاح!</h1>
        <p class="subtitle">شكراً لثقتك بنا. لقد تم تأكيد حجزك وسيصلك تفاصيل الرحلة على  الواتساب .</p>
        
        
        {% if telegram_link %}
<div class="alert alert-success">
    ✅ تم تأكيد الحجز! 
    <br>
    اضغط هنا لتأكيد حسابك على Telegram:
    <a href="{{ telegram_link }}" target="_blank">{{ telegram_link }}</a>
</div>
{% endif %}
        <div class="action-buttons">

            <a href="{% url 'index' %}" class="btn btn-outline">
                <i class="fas fa-home"></i> العودة للرئيسية
            </a>
        </div>
    </div>

    <script>
        // Create confetti effect
        function createConfetti() {
            const colors = ['#6C63FF', '#4D44DB', '#28A745', '#FFC107', '#FF5252'];
            const container = document.querySelector('.success-container');
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = -10 + 'px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
                
                const animationDuration = Math.random() * 3 + 2;
                
                confetti.style.animation = `
                    fall ${animationDuration}s ease-in forwards,
                    fade ${animationDuration}s ease-in forwards
                `;
                
                confetti.style.setProperty('--x-end', (Math.random() - 0.5) * 200 + 'px');
                
                // Remove confetti after animation
                setTimeout(() => {
                    confetti.remove();
                }, animationDuration * 1000);
            }
        }

        // Add styles for confetti animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    top: 100%;
                    transform: translateX(var(--x-end)) rotate(360deg);
                }
            }
            @keyframes fade {
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Trigger confetti on page load
        window.addEventListener('load', () => {
            createConfetti();
            
            // Play success sound (optional)
            // const audio = new Audio('success-sound.mp3');
            // audio.volume = 0.3;
            // audio.play();
        });

        // Add hover effect to success icon
        const successIcon = document.querySelector('.success-icon');
        successIcon.addEventListener('mouseover', () => {
            successIcon.style.transform = 'scale(1.1)';
            successIcon.style.transition = 'transform 0.3s ease';
        });
        
        successIcon.addEventListener('mouseout', () => {
            successIcon.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
