{% load static %}
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Face Scan</title>
    <style>
        video, canvas {
            width: 300px;
            border: 2px solid #444;
            border-radius: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #2c7;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #1a5;
        }
    </style>
</head>
<body>
    <h2>📷 مسح الوجه</h2>

    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <form id="faceForm" method="POST" enctype="multipart/form-data" action="{% url 'upload_face' %}">
        {% csrf_token %}
        <input type="file" id="face_image" name="face_image" accept="image/*" style="display:none;">
        <button type="button" onclick="capture()">التقاط</button>
    </form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const faceInput = document.getElementById('face_image');

        // تشغيل الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            });

        function capture() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const file = new File([blob], "face.jpg", { type: "image/jpeg" });

                // نرفع الملف في الفورم
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                faceInput.files = dataTransfer.files;

                document.getElementById('faceForm').submit();
            }, "image/jpeg", 0.8);
        }
    </script>
</body>
</html>
